<!DOCTYPE html>
<html>
<head>
    <title>Smart Protector</title>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial; background: #1a1a2e; color: white; padding: 20px; }
        .card { background: #16213e; border-radius: 10px; padding: 20px; margin: 10px; display: inline-block; min-width: 150px; }
        .valor { font-size: 36px; font-weight: bold; color: #00ff88; }
        .status-ligado { color: #00ff88; }
        .status-desligado { color: #ff4444; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; text-align: center; border-bottom: 1px solid #333; }
        th { background: #0f0f1a; color: #00ff88; }
        canvas { max-height: 400px; margin-top: 20px; }
        .filtros { margin: 20px 0; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        select, button { background: #0f0f1a; color: white; border: 1px solid #00ff88; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        button:hover { background: #00ff88; color: #0f0f1a; }
        .exportar { margin-top: 20px; text-align: right; }
        .btn-export { background: #00ff88; color: #0f0f1a; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🔌 SMART PROTECTOR</h1>
    
    <div class="card"><div>⚡ Tensão</div><div class="valor" id="tensao">---</div><div>V</div></div>
    <div class="card"><div>🔌 Corrente</div><div class="valor" id="corrente">---</div><div>A</div></div>
    <div class="card"><div>⚡ Potência</div><div class="valor" id="potencia">---</div><div>W</div></div>
    <div class="card"><div>🔒 Estado</div><div class="valor" id="estado">---</div></div>
    
    <div class="filtros">
        <label>Período: </label>
        <select id="periodo">
            <option value="1">Última hora</option>
            <option value="6">Últimas 6 horas</option>
            <option value="24" selected>Últimas 24 horas</option>
            <option value="168">Últimos 7 dias</option>
            <option value="720">Últimos 30 dias</option>
        </select>
        <button id="atualizar">🔄 Atualizar</button>
    </div>
    
    <canvas id="grafico"></canvas>
    
    <h2>📊 ESTATÍSTICAS</h2>
    <div id="stats"></div>
    
    <h2>📋 ÚLTIMOS REGISTROS</h2>
    <div class="tabela-container" style="overflow-x: auto; max-height: 400px; overflow-y: auto;">
        <table id="tabela">
            <thead><tr><th>Data/Hora</th><th>Tensão (V)</th><th>Corrente (A)</th><th>Potência (W)</th><th>Estado</th></tr></thead>
            <tbody id="tbody"></tbody>
    </div>
    
    <div class="exportar">
        <button class="btn-export" id="exportarCSV">📎 Exportar CSV</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCrTIZNk9aZxVHhYyOvBo3jdLX3GQ16jsk",
            databaseURL: "https://smart-protector-77ffd-default-rtdb.firebaseio.com"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let dadosHistoricos = [];
        let grafico;
        
        // Dados em tempo real
        db.ref('/atual').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('tensao').innerText = (data.tensao || 0).toFixed(1);
                document.getElementById('corrente').innerText = (data.corrente || 0).toFixed(2);
                document.getElementById('potencia').innerText = (data.potencia || 0).toFixed(0);
                const estado = data.estado || 'DESLIGADO';
                const estadoEl = document.getElementById('estado');
                estadoEl.innerText = estado;
                estadoEl.className = 'valor ' + (estado === 'LIGADO' ? 'status-ligado' : 'status-desligado');
            }
        });
        
        async function carregarHistorico(limiteHoras) {
            document.getElementById('tbody').innerHTML = '<tr><td colspan="5">Carregando...</td></tr>';
            
            const snapshot = await db.ref('/historico').once('value');
            const dados = [];
            const agora = Date.now();
            const limiteMs = limiteHoras * 3600000;
            
            snapshot.forEach((child) => {
                const item = child.val();
                if (item.timestamp) {
                    // Remove caracteres especiais do timestamp
                    let timestampStr = item.timestamp;
                    // Remove caracteres não desejados (mantém apenas números, espaço, hífen, dois pontos)
                    timestampStr = timestampStr.replace(/[^\d\s\-:]/g, '');
                    
                    const dataItem = new Date(timestampStr.replace(' ', 'T'));
                    const timeMs = dataItem.getTime();
                    if (!isNaN(timeMs) && (agora - timeMs) <= limiteMs) {
                        dados.push({
                            timestamp: dataItem,
                            timestampStr: timestampStr,
                            tensao: item.tensao || 0,
                            corrente: item.corrente || 0,
                            potencia: item.potencia || 0,
                            estado: item.estado || 'DESLIGADO'
                        });
                    }
                }
            });
            
            dados.sort((a, b) => a.timestamp - b.timestamp);
            dadosHistoricos = dados;
            
            atualizarTabela(dados);
            atualizarEstatisticas(dados);
            atualizarGrafico(dados);
        }
        
        function atualizarTabela(dados) {
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = '';
            const ultimos = dados.slice(-50).reverse();
            for (const item of ultimos) {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = item.timestampStr;
                row.insertCell(1).innerText = item.tensao.toFixed(1);
                row.insertCell(2).innerText = item.corrente.toFixed(2);
                row.insertCell(3).innerText = item.potencia.toFixed(0);
                row.insertCell(4).innerText = item.estado;
            }
            if (dados.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5">Nenhum registro encontrado. Aguardando dados...<td></td>';
            }
        }
        
        function atualizarEstatisticas(dados) {
            if (dados.length === 0) {
                document.getElementById('stats').innerHTML = '<div class="card">Aguardando dados...</div>';
                return;
            }
            
            let soma = 0, min = 999, max = -999;
            for (const item of dados) {
                const v = item.tensao;
                soma += v;
                if (v < min) min = v;
                if (v > max) max = v;
            }
            const media = (soma / dados.length).toFixed(1);
            
            document.getElementById('stats').innerHTML = `
                <div class="card" style="display:inline-block">📈 Média: ${media} V</div>
                <div class="card" style="display:inline-block">📈 Máxima: ${max.toFixed(1)} V</div>
                <div class="card" style="display:inline-block">📉 Mínima: ${min.toFixed(1)} V</div>
                <div class="card" style="display:inline-block">📝 Total: ${dados.length} registros</div>
            `;
        }
        
        function atualizarGrafico(dados) {
            if (dados.length === 0) {
                if (grafico) grafico.destroy();
                return;
            }
            
            const labels = dados.map(d => d.timestamp.toLocaleTimeString());
            const tensoes = dados.map(d => d.tensao);
            
            if (grafico) grafico.destroy();
            const ctx = document.getElementById('grafico').getContext('2d');
            grafico = new Chart(ctx, {
                type: 'line',
                data: { 
                    labels: labels, 
                    datasets: [{ 
                        label: 'Tensão (V)', 
                        data: tensoes, 
                        borderColor: '#00ff88', 
                        backgroundColor: 'rgba(0,255,136,0.1)', 
                        fill: true, 
                        tension: 0.3,
                        pointRadius: 2
                    }] 
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: true,
                    scales: { 
                        y: { 
                            min: Math.max(0, Math.min(...tensoes) - 5),
                            max: Math.max(...tensoes) + 5,
                            title: { display: true, text: 'Tensão (V)' }
                        } 
                    }
                }
            });
        }
        
        function exportarCSV() {
            if (dadosHistoricos.length === 0) {
                alert("Não há dados para exportar!");
                return;
            }
            
            let csv = "Data/Hora,Tensão (V),Corrente (A),Potência (W),Estado\n";
            for (const item of dadosHistoricos) {
                csv += `"${item.timestampStr}",${item.tensao.toFixed(1)},${item.corrente.toFixed(2)},${item.potencia.toFixed(0)},${item.estado}\n`;
            }
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `smart_protector_${new Date().toISOString().slice(0,19)}.csv`;
            link.click();
        }
        
        document.getElementById('periodo').addEventListener('change', function() {
            carregarHistorico(parseInt(this.value));
        });
        document.getElementById('atualizar').addEventListener('click', () => {
            carregarHistorico(parseInt(document.getElementById('periodo').value));
        });
        document.getElementById('exportarCSV').addEventListener('click', exportarCSV);
        
        carregarHistorico(24);
    </script>
</body>
</html>
