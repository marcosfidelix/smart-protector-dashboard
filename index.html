<!DOCTYPE html>
<html>
<head>
    <title>Smart Protector</title>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <h1>🔌 SMART PROTECTOR</h1>
    
    <div>
        <h2>Dados em Tempo Real</h2>
        <p>⚡ Tensão: <span id="tensao">---</span> V</p>
        <p>🔌 Corrente: <span id="corrente">---</span> A</p>
        <p>⚡ Potência: <span id="potencia">---</span> W</p>
        <p>🔒 Estado: <span id="estado">---</span></p>
    </div>
    
    <div>
        <h2>📊 Estatísticas (últimos registros)</h2>
        <p>📈 Média Tensão: <span id="media">---</span> V</p>
        <p>📈 Máxima: <span id="maxima">---</span> V</p>
        <p>📉 Mínima: <span id="minima">---</span> V</p>
        <p>📝 Total registros: <span id="total">---</span></p>
    </div>
    
    <div>
        <h2>📋 Últimos 20 registros</h2>
        <table border="1" cellpadding="5" id="tabela">
            <thead><tr><th>Data/Hora</th><th>Tensão (V)</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCrTIZNk9aZxVHhYyOvBo3jdLX3GQ16jsk",
            databaseURL: "https://smart-protector-77ffd-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        // Dados atuais
        db.ref('/atual').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('tensao').innerText = data.tensao?.toFixed(1) || '---';
                document.getElementById('corrente').innerText = data.corrente?.toFixed(2) || '---';
                document.getElementById('potencia').innerText = data.potencia?.toFixed(0) || '---';
                document.getElementById('estado').innerText = data.estado || 'DESLIGADO';
            }
        });
        
        // Busca histórico
        async function carregarHistorico() {
            const tensaoSnap = await db.ref('/historico/tensao').once('value');
            const timestampSnap = await db.ref('/historico/timestamp').once('value');
            
            const tensoes = tensaoSnap.val() || {};
            const timestamps = timestampSnap.val() || {};
            
            const dados = [];
            for (const id in tensoes) {
                if (timestamps[id]) {
                    dados.push({
                        tensao: tensoes[id],
                        timestamp: timestamps[id]
                    });
                }
            }
            
            dados.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
            
            // Estatísticas
            if (dados.length > 0) {
                let soma = 0, max = -999, min = 999;
                for (const item of dados) {
                    soma += item.tensao;
                    if (item.tensao > max) max = item.tensao;
                    if (item.tensao < min) min = item.tensao;
                }
                document.getElementById('media').innerText = (soma/dados.length).toFixed(1);
                document.getElementById('maxima').innerText = max.toFixed(1);
                document.getElementById('minima').innerText = min.toFixed(1);
                document.getElementById('total').innerText = dados.length;
            }
            
            // Tabela (últimos 20)
            const tbody = document.querySelector('#tabela tbody');
            tbody.innerHTML = '';
            for (let i = 0; i < Math.min(20, dados.length); i++) {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = dados[i].timestamp;
                row.insertCell(1).innerText = dados[i].tensao.toFixed(1);
            }
        }
        
        carregarHistorico();
    </script>
</body>
</html>
